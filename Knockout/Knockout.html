<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knockout Tärningsspel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="spelet">
        <h1>Knockout!</h1>
        <h2>Choose a number, try your luck.</h2>
        <!-- Spelaren väljer en knockout-siffra mellan 6-9 -->
        <label for="knockoutNumber">Choose knockout-number:</label>
        <select id="knockoutNumber">
            <option value="">-- Choose --</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
        </select>

        <button id="rollBtn">Throw dice</button>
        <button id="restartBtn">Restart</button>

    <div id="diceDisplay"></div>

    <p id="sumText">Total score: 0</p>
    <p id="messageText"></p>

    
    </div>
    <script src="script.js"></script>
</body>       
</html>
